<!DOCTYPE html>
<html lang="en">
<head>
  <link as="image" href="images/Glamorous retro logo design.png" rel="preload"/>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Glambient — Video</title>

  <link rel="stylesheet" href="nav.css">
  <style>
    :root {
      --bg:#ffffff;
      --text:#111216;
      --accent:#d4697b;
      --accent-strong:#c0394a;
      --max:1180px;
    }

    @font-face {
      font-family:'Hillstown Sans';
      src:url('fonts/Hillstown Sans Clean Demo.otf') format('opentype');
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    body {
      background:var(--bg);
      color:var(--text);
      font-family:"Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    /* Vimeo embed styling */
    main {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:0 0 60px;
      gap:80px;
    }

    .video-wrapper {
      width:80%;
      max-width:1000px;
      aspect-ratio:16/9;
      position:relative;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      border-radius:12px;
      overflow:hidden;
    }

    iframe {
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
      border:0;
      border-radius:12px;
      filter: saturate(1.1) contrast(1.08);
    }

    @media (max-width:700px){
      main { padding:40px 0; gap:50px; }
      .video-wrapper { width:90%; }
    }
  </style>
  <meta http-equiv="Cache-Control" content="no-store, must-revalidate">
</head>

<body>
  <script src="assets/js/nav.js"></script>
  <div class="page-banner">
    <div class="banner-inner">
      <span class="banner-eyebrow">Glambient Studios</span>
      <hr class="banner-rule">
      <h1>Videos</h1>
      <hr class="banner-rule">
      <p class="banner-sub">Wedding films, captured with a cinematic eye</p>
    </div>
  </div>

  <main>
    <!-- Vimeo video 1 (Catherine) -->
    <div class="video-wrapper">
      <iframe 
        src="https://player.vimeo.com/video/1131352277?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479&amp;autoplay=1&amp;loop=1"
        allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        title="Catherine Wedding">
      </iframe>
    </div>

    <!-- Vimeo video 2 (Mike Wedding) -->
    <div class="video-wrapper">
      <iframe 
        src="https://player.vimeo.com/video/1131406663?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479"
        allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        title="Mike Wedding">
      </iframe>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
  </main>

<script>
(function(){
  const version = new Date().toISOString().slice(0,13).replace(/\D/g,'');
  document.querySelectorAll('a[href$=".html"]').forEach(a=>{
    try{
      const url = new URL(a.href, location.origin);
      if(url.origin === location.origin){
        url.searchParams.set('v', version);
        a.href = url.toString();
      }
    }catch(e){}
  });
})();
</script>
</body>
</html>
