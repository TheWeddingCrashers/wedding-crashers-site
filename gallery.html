<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gallery — Glambient</title>
  <link rel="stylesheet" href="nav.css">
  <style>
    body {
      background: #ffffff;
    }

    .gallery-grid {
      max-width: 1380px;
      margin: 0 auto;
      padding: 30px 6vw 140px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: center;
      gap: 48px 30px;
    }
    .gallery-grid img {
      width: clamp(220px, 30vw, 450px);
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
      border-radius: 6px;
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.12);
      --offset-x: 0px;
      --offset-y: 0px;
      --hover-scale: 1;
      transform: translate3d(var(--offset-x), var(--offset-y), 0) scale(var(--hover-scale));
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease;
      background: #fff;
      position: relative;
      z-index: 1;
    }
    .gallery-grid img:is(:hover, :focus-visible) {
      --hover-scale: 1.03;
      box-shadow: 0 22px 42px rgba(0, 0, 0, 0.14);
    }
    .gallery-grid img:focus-visible {
      outline: 2px solid #1a3d2b;
      outline-offset: 3px;
    }
    .gallery-grid img:nth-child(6n + 1) {
      width: clamp(240px, 27vw, 380px);
      aspect-ratio: 3 / 4;
      margin-top: 18px;
      --offset-x: -30px;
    }
    .gallery-grid img:nth-child(6n + 2) {
      width: clamp(300px, 40vw, 560px);
      aspect-ratio: 5 / 3;
      --offset-x: 34px;
    }
    .gallery-grid img:nth-child(6n + 3) {
      width: clamp(240px, 28vw, 400px);
      aspect-ratio: 4 / 5;
      margin-top: -34px;
      --offset-x: -14px;
      z-index: 2;
    }
    .gallery-grid img:nth-child(6n + 4) {
      width: clamp(320px, 42vw, 620px);
      aspect-ratio: 3 / 2;
      margin-top: 20px;
      --offset-x: 56px;
    }
    .gallery-grid img:nth-child(6n + 5) {
      width: clamp(220px, 25vw, 360px);
      aspect-ratio: 2 / 3;
      margin-top: -28px;
      --offset-x: -48px;
      z-index: 3;
    }
    .gallery-grid img:nth-child(6n + 6) {
      width: clamp(270px, 31vw, 470px);
      aspect-ratio: 16 / 10;
      margin-top: 24px;
      --offset-x: 16px;
    }
    @media (max-width: 900px) {
      .gallery-grid {
        gap: 30px 18px;
        padding: 20px 5vw 90px;
      }
      .gallery-grid img,
      .gallery-grid img:nth-child(6n + 1),
      .gallery-grid img:nth-child(6n + 2),
      .gallery-grid img:nth-child(6n + 3),
      .gallery-grid img:nth-child(6n + 4),
      .gallery-grid img:nth-child(6n + 5),
      .gallery-grid img:nth-child(6n + 6) {
        width: clamp(200px, 43vw, 420px);
      }
      .gallery-grid img:nth-child(3n + 1) {
        aspect-ratio: 3 / 4;
        --offset-x: -10px;
        margin-top: 8px;
      }
      .gallery-grid img:nth-child(3n + 2) {
        aspect-ratio: 5 / 3;
        --offset-x: 12px;
      }
      .gallery-grid img:nth-child(3n) {
        aspect-ratio: 4 / 5;
        margin-top: -14px;
      }
    }
    @media (max-width: 560px) {
      .gallery-grid {
        display: block;
        max-width: 440px;
        padding: 12px 16px 64px;
      }
      .gallery-grid img,
      .gallery-grid img:nth-child(6n + 1),
      .gallery-grid img:nth-child(6n + 2),
      .gallery-grid img:nth-child(6n + 3),
      .gallery-grid img:nth-child(6n + 4),
      .gallery-grid img:nth-child(6n + 5),
      .gallery-grid img:nth-child(6n + 6),
      .gallery-grid img:nth-child(3n + 1),
      .gallery-grid img:nth-child(3n + 2),
      .gallery-grid img:nth-child(3n) {
        width: 100%;
        margin: 0 0 18px;
        --offset-x: 0px;
        --offset-y: 0px;
        aspect-ratio: auto;
      }
      .gallery-header h1 { font-size: 1.6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .gallery-grid img {
        transition: none;
      }

      .gallery-grid img:is(:hover, :focus-visible) {
        --hover-scale: 1;
      }
    }
  </style>
</head>
<body>
  <script src="assets/js/nav.js"></script>
  <div class="page-banner">
    <div class="banner-inner">
      <span class="banner-eyebrow">Glambient Studios</span>
      <hr class="banner-rule">
      <h1>Gallery</h1>
      <hr class="banner-rule">
      <p class="banner-sub">Moments captured from weddings we've had the pleasure of shooting</p>
    </div>
  </div>

  <main>
    <div class="gallery-grid">
        <img src="images/6-22.jpg" alt="Wedding dress detail" loading="lazy">
        <img src="images/6-5.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/3-8.png" alt="Wedding photo" loading="lazy">
        <img src="images/6-14.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/3-13.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/4-8.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/5-10.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/6-58.jpg" alt="Groom portrait" loading="lazy">
        <img src="images/10-11.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/6-28.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/6-43.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/6-46.jpg" alt="Bride and bridesmaids at church" loading="lazy">
        <img src="images/6-50.jpg" alt="Wedding ceremony" loading="lazy">
        <img src="images/6-55.jpg" alt="Wedding ceremony" loading="lazy">
        <img src="images/6-61.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/6-83.jpg" alt="Bride and bridesmaids under floral arch" loading="lazy">
        <img src="images/6-75.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/4-18.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/5-25.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/6-35.jpg" alt="Wedding family portrait" loading="lazy">
        <img src="images/6-68.jpg" alt="Couple portrait" loading="lazy">
        <img src="images/6-79.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/10-16.jpg" alt="Wedding photo" loading="lazy">
        <img src="images/6-87.jpg" alt="Wedding reception" loading="lazy">
        <img src="images/6-90.jpg" alt="Wedding photo" loading="lazy">
    </div>
  </main>

  <script>
  (function(){
    const version = new Date().toISOString().slice(0,13).replace(/\D/g,'');
    document.querySelectorAll('a[href$=".html"]').forEach(a=>{
      try{
        const url = new URL(a.href, location.origin);
        if(url.origin === location.origin){
          url.searchParams.set('v', version);
          a.href = url.toString();
        }
      }catch(e){}
    });
  })();
  </script>
</body>
</html>
