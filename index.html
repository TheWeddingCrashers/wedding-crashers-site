<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glambient — Cinematic Wedding Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #fff;
      color: #000;
      font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      padding: clamp(24px, 3vw, 48px);
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: clamp(48px, 8vh, 120px);
    }

    .menu {
      position: relative;
    }

    .menu-icon {
      width: 24px;
      height: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0;
      cursor: pointer;
    }

    .menu summary::-webkit-details-marker {
      display: none;
    }

    .menu summary {
      list-style-type: none;
    }

    .menu-icon span {
      display: block;
      width: 100%;
      height: 2px;
      background: #000;
    }

    .menu-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 14px);
      background: #fff;
      border: 1px solid #000;
      padding: 12px;
      display: grid;
      gap: 10px;
      min-width: 170px;
    }

    .menu-panel a {
      color: #000;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
      white-space: nowrap;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      padding: clamp(24px, 5vw, 56px) 0;
    }

    .hero-collage {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .hero-shot {
      position: absolute;
      object-fit: cover;
      aspect-ratio: 3 / 4;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.14);
      will-change: transform, opacity;
      backface-visibility: hidden;
      transform-origin: center center;
    }

    .shot-1 {
      width: clamp(130px, 16vw, 230px);
      left: 7%;
      top: 14%;
      transform: rotate(-2.2deg);
      z-index: 2;
    }

    .shot-2 {
      width: clamp(120px, 14vw, 210px);
      left: 18%;
      bottom: 8%;
      transform: rotate(1.9deg);
      z-index: 5;
    }

    .shot-3 {
      width: clamp(120px, 15vw, 220px);
      right: 10%;
      top: 18%;
      transform: rotate(2.6deg);
      z-index: 2;
    }

    .shot-4 {
      width: clamp(155px, 20vw, 280px);
      right: 4%;
      bottom: 6%;
      transform: rotate(-1.8deg);
      z-index: 5;
    }

    .shot-5 {
      width: clamp(110px, 13vw, 195px);
      left: 33%;
      top: 7%;
      transform: rotate(1.2deg);
      z-index: 3;
    }

    .shot-6 {
      width: clamp(110px, 14vw, 205px);
      right: 30%;
      bottom: 2%;
      transform: rotate(-2.7deg);
      z-index: 1;
    }

    h1 {
      font-size: clamp(2rem, 8.8vw, 8.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 0.92;
      max-width: 15ch;
      position: relative;
      z-index: 4;
    }

    .headline-line {
      display: block;
    }

    .brand-statement {
      --statement-size: 5rem;
      width: 100%;
      padding: 4rem 0;
      text-align: center;
    }

    .brand-statement-text {
      font-size: var(--statement-size);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.35;
      margin: 0 auto;
    }

    .brand-line {
      display: block;
    }

    @media (max-width: 1100px) {
      .brand-statement {
        --statement-size: 4rem;
      }
    }

    @media (max-width: 768px) {
      .brand-statement {
        --statement-size: 2.8rem;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 20px;
      }

      .shot-2,
      .shot-4 {
        display: none;
      }

      h1 {
        line-height: 0.95;
      }

      .brand-statement {
        --statement-size: 1.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <details class="menu">
        <summary class="menu-icon">
          <span class="visually-hidden">Menu</span>
          <span></span>
          <span></span>
          <span></span>
        </summary>
        <div class="menu-panel">
          <a href="about.html">About</a>
          <a href="gallery.html">Gallery</a>
          <a href="contact.html">Contact</a>
        </div>
      </details>
    </header>

    <main class="hero">
      <div class="hero-collage" aria-hidden="true">
        <img class="hero-shot shot-1" src="images/6-35.jpg" alt="" role="presentation" data-depth="0.8">
        <img class="hero-shot shot-2" src="images/6-46.jpg" alt="" role="presentation" data-depth="1.4">
        <img class="hero-shot shot-3" src="images/6-58.jpg" alt="" role="presentation" data-depth="0.8">
        <img class="hero-shot shot-4" src="images/6-75.jpg" alt="" role="presentation" data-depth="1.4">
        <img class="hero-shot shot-5" src="images/6-22.jpg" alt="" role="presentation" data-depth="1.1">
        <img class="hero-shot shot-6" src="images/6-83.jpg" alt="" role="presentation" data-depth="0.6">
      </div>
      <h1>
        <span class="headline-line">Cinematic Wedding Photography</span>
        <span class="headline-line">Raw / Real / Unstaged</span>
        <span class="headline-line">UK &amp; Destination</span>
      </h1>
    </main>

    <section class="brand-statement" aria-label="Brand statement">
      <p class="brand-statement-text">
        <span class="brand-line">No Awkward Posing</span>
        <span class="brand-line">No Fake Moments</span>
        <span class="brand-line">Just Real Energy</span>
      </p>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js" defer></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (!window.gsap || !window.ScrollTrigger) {
        console.error("GSAP or ScrollTrigger failed to load; hero parallax animations are disabled.");
        return;
      }

      const MOBILE_BREAKPOINT = 768;
      const isDev = ["localhost", "127.0.0.1"].includes(window.location.hostname);
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const isMobile = window.matchMedia(`(max-width: ${MOBILE_BREAKPOINT}px)`).matches;
      const hero = document.querySelector(".hero");
      const shots = Array.from(document.querySelectorAll(".hero-shot"));

      if (!hero || !shots.length) return;

      gsap.registerPlugin(ScrollTrigger);
      gsap.set(shots, { force3D: true });

      gsap.fromTo(
        shots,
        { autoAlpha: 0 },
        {
          autoAlpha: 1,
          duration: 0.9,
          ease: "power2.out",
          stagger: 0.08
        }
      );

      if (prefersReducedMotion) return;

      // Vertical travel in px for subtle depth while preserving readability.
      const MOBILE_BASE_DISTANCE = 20;
      const DESKTOP_BASE_DISTANCE = 34;
      // Scrub timing smooths the parallax response (higher = softer lag).
      const MOBILE_SCRUB = 1.1;
      const DESKTOP_SCRUB = 1.8;

      shots.forEach((shot) => {
        const depthValue = shot.dataset.depth;
        if (!depthValue) {
          if (isDev) console.warn("Missing data-depth on hero image:", shot);
          return;
        }

        const depth = Number(depthValue);
        if (Number.isNaN(depth)) {
          if (isDev) console.warn("Invalid data-depth on hero image:", shot, depthValue);
          return;
        }

        const distance = (isMobile ? MOBILE_BASE_DISTANCE : DESKTOP_BASE_DISTANCE) * depth;

        gsap.fromTo(
          shot,
          { y: -distance, scale: 1 },
          {
            y: distance,
            scale: 1.05,
            ease: "none",
            scrollTrigger: {
              trigger: hero,
              start: "top bottom",
              end: "bottom top",
              scrub: isMobile ? MOBILE_SCRUB : DESKTOP_SCRUB,
              invalidateOnRefresh: true
            }
          }
        );
      });
    });
  </script>
</body>
</html>
