<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glambient — Cinematic Wedding Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --text: #080808;
      --accent: #fff064;
      --section-gap: clamp(4rem, 10vw, 11rem);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    .site {
      width: 100%;
      overflow: clip;
      padding-inline: clamp(1.2rem, 4vw, 3rem);
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: grid;
      align-items: center;
      isolation: isolate;
      padding-block: clamp(4.5rem, 10vh, 8rem) clamp(2rem, 6vh, 3rem);
    }

    .hero-copy {
      max-width: min(94vw, 1020px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 0.9;
      font-size: clamp(2rem, 8.9vw, 8.4rem);
      z-index: 8;
    }

    .hero-copy .line {
      display: block;
    }

    .hero-collage {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .layered-image {
      position: absolute;
      width: clamp(120px, 16vw, 290px);
      object-fit: cover;
      border-radius: 18px;
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.17);
      transform-origin: center center;
      backface-visibility: hidden;
      will-change: transform, opacity;
      transition: transform 0.5s ease;
      pointer-events: auto;
    }

    .layered-image:hover {
      transform: scale(1.03) rotate(var(--rot, 0deg));
    }

    .hero .layered-image { aspect-ratio: 3 / 4; }

    .l1 { left: 3%; top: 14%; --rot: -2.6deg; transform: rotate(-2.6deg); z-index: 2; }
    .l2 { left: 16%; bottom: 4%; --rot: 2.3deg; transform: rotate(2.3deg); z-index: 7; }
    .l3 { left: 34%; top: 7%; --rot: -1.7deg; transform: rotate(-1.7deg); z-index: 4; width: clamp(110px, 13vw, 215px); }
    .l4 { right: 32%; bottom: 1%; --rot: -2.9deg; transform: rotate(-2.9deg); z-index: 3; width: clamp(110px, 14vw, 220px); }
    .l5 { right: 8%; top: 18%; --rot: 2.2deg; transform: rotate(2.2deg); z-index: 4; }
    .l6 { right: 2%; bottom: 6%; --rot: -1.4deg; transform: rotate(-1.4deg); z-index: 8; width: clamp(145px, 20vw, 305px); }

    section {
      margin-block: var(--section-gap);
    }

    .text-break {
      font-size: clamp(1.9rem, 7vw, 6.6rem);
      line-height: 0.92;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      max-width: 13ch;
    }

    .text-break .line {
      display: block;
      margin-bottom: 0.12em;
    }

    .collage-wrap {
      position: relative;
      padding-block: 1.2rem;
    }

    .collage-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      grid-auto-rows: minmax(60px, auto);
      gap: clamp(0.7rem, 2vw, 1.45rem);
    }

    .collage-card {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.12);
      background: #f8f8f8;
      transform: rotate(var(--tilt, 0deg));
      will-change: transform, opacity;
    }

    .collage-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s ease;
    }

    .collage-card:hover img {
      transform: scale(1.04);
    }

    .c1 { grid-column: 1 / span 5; grid-row: 1 / span 8; --tilt: -1deg; z-index: 2; }
    .c2 { grid-column: 6 / span 4; grid-row: 2 / span 5; --tilt: 1.7deg; z-index: 5; }
    .c3 { grid-column: 9 / span 4; grid-row: 1 / span 7; --tilt: -2.1deg; z-index: 3; }
    .c4 { grid-column: 2 / span 4; grid-row: 8 / span 6; --tilt: 1.4deg; margin-top: -1.8rem; z-index: 7; }
    .c5 { grid-column: 6 / span 7; grid-row: 7 / span 8; --tilt: -0.8deg; margin-left: 0.8rem; z-index: 4; }
    .c6 { grid-column: 4 / span 4; grid-row: 14 / span 5; --tilt: 1.2deg; margin-top: -2.2rem; z-index: 8; }

    .testimonial {
      max-width: 760px;
    }

    .testimonial-quote {
      font-size: clamp(2.1rem, 8vw, 7.5rem);
      line-height: 0.9;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .testimonial-client {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.15rem 0.48rem;
      background: var(--accent);
      font-size: clamp(0.75rem, 1.6vw, 1rem);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }

    .spacer {
      height: clamp(1rem, 5vh, 3rem);
    }

    @media (max-width: 900px) {
      .collage-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .c1 { grid-column: 1 / span 4; grid-row: 1 / span 7; }
      .c2 { grid-column: 4 / span 3; grid-row: 2 / span 5; }
      .c3 { grid-column: 1 / span 3; grid-row: 8 / span 6; }
      .c4 { grid-column: 3 / span 4; grid-row: 7 / span 6; margin-top: -1rem; }
      .c5 { grid-column: 1 / span 6; grid-row: 14 / span 8; margin-left: 0; }
      .c6 { grid-column: 2 / span 4; grid-row: 22 / span 5; margin-top: -1.2rem; }
    }

    @media (max-width: 680px) {
      .hero {
        min-height: 92vh;
      }

      .hero-copy {
        line-height: 0.92;
      }

      .l2,
      .l6 {
        display: none;
      }

      .layered-image {
        border-radius: 14px;
      }

      .collage-grid {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
        gap: 1.2rem;
      }

      .collage-card,
      .c1,
      .c2,
      .c3,
      .c4,
      .c5,
      .c6 {
        grid-column: auto;
        grid-row: auto;
        margin: 0;
        transform: none;
      }

      .collage-card {
        aspect-ratio: 4 / 5;
      }

      .text-break {
        max-width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html,
      body {
        scroll-behavior: auto;
      }

      .layered-image,
      .collage-card,
      .collage-card img {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="site">
    <header class="hero">
      <div class="hero-collage" aria-hidden="true">
        <img class="layered-image parallax-item l1" src="images/6-35.jpg" alt="" data-speed="0.55" data-scale="1.04" loading="eager" decoding="async">
        <img class="layered-image parallax-item l2" src="images/6-46.jpg" alt="" data-speed="1.2" data-scale="1.06" loading="eager" decoding="async">
        <img class="layered-image parallax-item l3" src="images/6-58.jpg" alt="" data-speed="0.72" data-scale="1.03" loading="eager" decoding="async">
        <img class="layered-image parallax-item l4" src="images/6-83.jpg" alt="" data-speed="0.95" data-scale="1.05" loading="lazy" decoding="async">
        <img class="layered-image parallax-item l5" src="images/6-22.jpg" alt="" data-speed="0.62" data-scale="1.04" loading="lazy" decoding="async">
        <img class="layered-image parallax-item l6" src="images/6-75.jpg" alt="" data-speed="1.3" data-scale="1.07" loading="lazy" decoding="async">
      </div>

      <h1 class="hero-copy">
        <span class="line">Editorial meets candid. Wedding photography and film. UK based. Available worldwide.</span>
      </h1>
    </header>

    <section class="text-break" aria-label="Editorial statement">
      <span class="line">No Cheese</span>
      <span class="line">No Fake Moments</span>
      <span class="line">Just Real Energy</span>
    </section>

    <section class="collage-wrap" aria-label="Photography collage">
      <div class="collage-grid">
        <figure class="collage-card parallax-item c1" data-speed="0.48" data-scale="1.02">
          <img src="images/6-61.jpg" alt="Bride and groom during ceremony" loading="lazy" decoding="async">
        </figure>
        <figure class="collage-card parallax-item c2" data-speed="1.02" data-scale="1.06">
          <img src="images/6-43.jpg" alt="Couple portrait in natural light" loading="lazy" decoding="async">
        </figure>
        <figure class="collage-card parallax-item c3" data-speed="0.65" data-scale="1.04">
          <img src="images/10-11.jpg" alt="Bridal detail close-up" loading="lazy" decoding="async">
        </figure>
        <figure class="collage-card parallax-item c4" data-speed="1.18" data-scale="1.07">
          <img src="images/6-79.jpg" alt="Guests dancing at reception" loading="lazy" decoding="async">
        </figure>
        <figure class="collage-card parallax-item c5" data-speed="0.58" data-scale="1.03">
          <img src="images/6-90.jpg" alt="Wide cinematic wedding moment" loading="lazy" decoding="async">
        </figure>
        <figure class="collage-card parallax-item c6" data-speed="0.9" data-scale="1.05">
          <img src="images/10-16.jpg" alt="Evening celebration portrait" loading="lazy" decoding="async">
        </figure>
      </div>
    </section>

    <section class="testimonial" aria-label="Client testimonial">
      <p class="testimonial-quote">A DREAM.</p>
      <p class="testimonial-client">Client Name</p>
    </section>

    <section class="text-break" aria-label="Secondary statement">
      <span class="line">Editorial Eye</span>
      <span class="line">Emotive Frames</span>
      <span class="line">Unstaged Stories</span>
    </section>

    <div class="spacer" aria-hidden="true"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      if (!window.gsap || !window.ScrollTrigger) return;

      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      gsap.registerPlugin(ScrollTrigger);

      const parallaxItems = gsap.utils.toArray(".parallax-item");
      if (!parallaxItems.length) return;

      gsap.set(parallaxItems, { force3D: true, autoAlpha: 0 });

      parallaxItems.forEach((item, index) => {
        const speed = Number(item.dataset.speed) || 0.7;
        const targetScale = Number(item.dataset.scale) || 1.04;
        const distance = Math.round((window.innerWidth < 768 ? 26 : 44) * speed);

        gsap.to(item, {
          autoAlpha: 1,
          duration: 0.7,
          delay: index * 0.04,
          ease: "power2.out"
        });

        if (prefersReducedMotion) return;

        gsap.fromTo(
          item,
          { y: -distance, scale: 1 },
          {
            y: distance,
            scale: targetScale,
            ease: "none",
            scrollTrigger: {
              trigger: item.closest("section, header") || item,
              start: "top bottom",
              end: "bottom top",
              scrub: window.innerWidth < 768 ? 1 : 1.8,
              invalidateOnRefresh: true
            }
          }
        );
      });
    });
  </script>
</body>
</html>
