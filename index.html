<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glambient — Cinematic Wedding Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #fff;
      color: #000;
      font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      padding: clamp(24px, 3vw, 48px);
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: clamp(48px, 8vh, 120px);
    }

    .menu-icon {
      width: 24px;
      height: 18px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0;
    }

    .menu-icon span {
      display: block;
      width: 100%;
      height: 2px;
      background: #000;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
    }

    h1 {
      font-size: clamp(2rem, 8.8vw, 8.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 0.92;
      max-width: 15ch;
    }

    .headline-line {
      display: block;
    }

    @media (max-width: 640px) {
      .page {
        padding: 20px;
      }

      h1 {
        line-height: 0.95;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="menu-icon" href="home.html" aria-label="Open site navigation">
        <span></span>
        <span></span>
        <span></span>
      </a>
    </header>

    <main class="hero">
      <h1>
        <span class="headline-line">Cinematic Wedding Photography</span>
        <span class="headline-line">Raw / Real / Unstaged</span>
        <span class="headline-line">UK &amp; Destination</span>
      </h1>
    </main>
  </div>
</body>
</html>
