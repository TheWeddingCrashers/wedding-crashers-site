<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Gallery — The Wedding Crashers</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --pink: #f19bb8;
      --light-pink: #f4c9d8;
      --dark: #111216;
      --text: #3a3a3a;
    }
    
    body {
      font-family: 'Outfit', -apple-system, system-ui, sans-serif;
      background: #fff;
      color: var(--text);
    }
    
    /* ===== NAVIGATION ===== */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #fff;
      z-index: 1000;
      border-bottom: 1px solid #f0f0f0;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.98);
    }
    
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--dark);
      text-transform: uppercase;
    }
    
    .menu {
      display: flex;
      gap: 40px;
      align-items: center;
      list-style: none;
    }
    
    .menu a {
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.3px;
      transition: color 0.3s ease;
      position: relative;
    }
    
    .menu a:hover {
      color: var(--pink);
    }
    
    .menu a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--pink);
      transition: width 0.3s ease;
    }
    
    .menu a:hover::after {
      width: 100%;
    }
    
    .cta-btn {
      background: var(--pink);
      color: #fff;
      padding: 10px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }
    
    .cta-btn:hover {
      background: #e87fa5;
      transform: translateY(-2px);
    }
    
    @media (max-width: 768px) {
      .menu { gap: 20px; font-size: 13px; }
    }
    
    /* ===== MAIN ===== */
    main {
      padding-top: 70px;
    }
    
    .gallery-header {
      background: linear-gradient(135deg, rgba(241, 155, 184, 0.1) 0%, rgba(244, 201, 216, 0.08) 100%);
      padding: 80px 20px;
      text-align: center;
    }
    
    .gallery-header h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 15px;
      letter-spacing: -0.5px;
    }
    
    .gallery-header p {
      font-size: 1.1rem;
      color: #666;
      font-weight: 400;
    }
    
    .gallery-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
    }
    
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      aspect-ratio: 1;
      cursor: pointer;
      background: #f0f0f0;
    }
    
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    
    .gallery-item:hover img {
      transform: scale(1.08);
    }
    
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: rgba(241, 155, 184, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 12px;
    }
    
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }
    
    .gallery-overlay-text {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* ===== LIGHTBOX ===== */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }
    
    .lightbox.open {
      display: flex;
    }
    
    .lightbox img {
      max-width: 95vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }
    
    .lightbox-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: none;
      font-size: 32px;
      padding: 20px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s;
    }
    
    .lightbox-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .lb-close {
      position: absolute;
      top: 20px;
      right: 20px;
      transform: none;
    }
    
    .lb-prev { left: 20px; }
    .lb-next { right: 20px; }
    
    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      color: #fff;
      text-align: center;
      padding: 50px 20px;
      margin-top: 100px;
    }
    
    footer p {
      margin: 10px 0;
      font-size: 0.95rem;
    }
    
    footer a {
      color: var(--pink);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- NAVIGATION -->
  <nav>
    <div class="nav-container">
      <div class="logo">TWC</div>
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="video.html">Videos</a></li>
        <li><a href="packages.html">Packages</a></li>
        <li><a href="contact.html" class="cta-btn">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <!-- HEADER -->
    <div class="gallery-header">
      <h1>Gallery</h1>
      <p>Click any photo to view • Use arrow keys to navigate</p>
    </div>

    <!-- GALLERY GRID -->
    <div class="gallery-container">
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </main>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-btn lb-prev" id="prevBtn">❮</button>
    <img id="lightboxImg" alt="Gallery image"/>
    <button class="lightbox-btn lb-next" id="nextBtn">❯</button>
    <button class="lightbox-btn lb-close" id="closeBtn">✕</button>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2025 The Wedding Crashers. All rights reserved.</p>
    <p><a href="https://instagram.com/thewedding.crashers" target="_blank">📸 Follow us on Instagram</a></p>
  </footer>

  <script>
    const images = [
      '/images/3-1.png', '/images/3-2.png', '/images/3-3.png', '/images/3-8.png',
      '/images/3-10.png', '/images/3-12.png', '/images/3-14.png', '/images/3-16.png',
      '/images/3-17.png', '/images/3-18.png', '/images/3-19.png', '/images/3-20.png',
      '/images/3-22.png', '/images/3-23.png', '/images/3-24.png', '/images/3-25.png',
      '/images/3-26.png', '/images/3-27.png', '/images/3-28.png', '/images/3-29.png',
      '/images/3-30.png', '/images/3-31.png', '/images/3-32.png', '/images/3-33.png',
      '/images/3-34.png', '/images/3-35.png', '/images/3-36.png', '/images/3-37.png',
      '/images/3-38.png', '/images/3-39.png', '/images/3-40.png', '/images/3-41.png',
      '/images/3-42.png', '/images/3-43.png', '/images/3-44.png', '/images/3-45.png',
      '/images/3-46.png', '/images/4-1.jpg', '/images/4-2.jpg', '/images/4-3.jpg',
      '/images/4-4.jpg', '/images/4-5.jpg', '/images/4-6.jpg', '/images/4-7.jpg',
      '/images/4-8.jpg'
    ];
    
    let currentIndex = 0;
    
    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      images.forEach((img, idx) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.onclick = () => openLightbox(idx);
        item.innerHTML = `
          <img src="${img}" alt="Gallery image ${idx + 1}" loading="lazy"/>
          <div class="gallery-overlay">
            <div class="gallery-overlay-text">View</div>
          </div>
        `;
        grid.appendChild(item);
      });
    }
    
    function openLightbox(idx) {
      currentIndex = idx;
      document.getElementById('lightbox').classList.add('open');
      document.getElementById('lightboxImg').src = images[currentIndex];
      document.body.style.overflow = 'hidden';
    }
    
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    
    function prevImage() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      document.getElementById('lightboxImg').src = images[currentIndex];
    }
    
    function nextImage() {
      currentIndex = (currentIndex + 1) % images.length;
      document.getElementById('lightboxImg').src = images[currentIndex];
    }
    
    document.getElementById('prevBtn').onclick = prevImage;
    document.getElementById('nextBtn').onclick = nextImage;
    document.getElementById('closeBtn').onclick = closeLightbox;
    document.getElementById('lightbox').onclick = (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    };
    
    window.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });
    
    renderGallery();
  </script>
</body>
</html>
